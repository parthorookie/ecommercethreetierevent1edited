global:
  scrape_interval:     15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:

  # ── RabbitMQ Prometheus plugin (port 15692) ────────────────────────────────
  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
    metrics_path: /metrics
    scrape_interval: 10s

  # ── Backend API (custom /metrics endpoint) ─────────────────────────────────
  - job_name: backend
    static_configs:
      - targets: ["backend:3000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # ── Prometheus self ────────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── Node exporter (if running) ─────────────────────────────────────────────
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 30s
