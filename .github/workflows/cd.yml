name: CD - Terraform Infra + EKS Deploy

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "helm/**"
      - "argo/**"
      - "k8s/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options: [plan, apply, destroy]

env:
  AWS_REGION: ap-south-1
  TF_DIR: terraform
  EKS_CLUSTER_NAME: ecommerce-eks

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Bootstrap S3 State Bucket
  # ─────────────────────────────────────────────
  bootstrap-state:
    name: Bootstrap S3 State Bucket
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 State Bucket with Object Lock
        run: |
          BUCKET="ecommerce-terraform-state-prod"
          REGION="${{ env.AWS_REGION }}"

          # Check if bucket exists
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket $BUCKET already exists"
          else
            echo "Creating bucket $BUCKET with Object Lock..."
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION" \
              --object-lock-enabled-for-bucket

            # Enable versioning (required for object lock)
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled

            # Set Object Lock to GOVERNANCE mode for 30 days
            aws s3api put-object-lock-configuration \
              --bucket "$BUCKET" \
              --object-lock-configuration \
              '{"ObjectLockEnabled":"Enabled","Rule":{"DefaultRetention":{"Mode":"GOVERNANCE","Days":30}}}'

            # Enable server-side encryption
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            # Block public access
            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

            echo "Bucket $BUCKET created successfully with Object Lock (GOVERNANCE, 30 days)"
          fi

  # ─────────────────────────────────────────────
  # JOB 2: Terraform Plan
  # ─────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=ecommerce-terraform-state-prod" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var="region=${{ env.AWS_REGION }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="project_name=ecommerce" \
            -var="environment=prod" \
            -out=tfplan \
            -detailed-exitcode
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3: Terraform Apply
  # ─────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && (github.event.inputs.action == 'apply' || github.event_name == 'push')
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=ecommerce-terraform-state-prod" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "eks_cluster=$(terraform output -raw eks_cluster_name)" >> $GITHUB_OUTPUT
          echo "rabbitmq_ip=$(terraform output -raw rabbitmq_private_ip)" >> $GITHUB_OUTPUT
          echo "aurora_endpoint=$(terraform output -raw aurora_endpoint)" >> $GITHUB_OUTPUT
          echo "alb_dns=$(terraform output -raw alb_dns_name)" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # JOB 4: Install ArgoCD + KEDA via Helm
  # ─────────────────────────────────────────────
  install-cluster-tools:
    name: Install ArgoCD & KEDA
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Create namespaces
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace worker --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace keda --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace argo --dry-run=client -o yaml | kubectl apply -f -

      - name: Add Helm repositories
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Install ArgoCD
        run: |
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --version 6.7.3 \
            --set server.service.type=ClusterIP \
            --set server.ingress.enabled=false \
            --wait --timeout=300s

      - name: Install Argo Workflows
        run: |
          helm upgrade --install argo-workflows argo/argo-workflows \
            --namespace argo \
            --set workflow.serviceAccount.create=true \
            --wait --timeout=300s

      - name: Install KEDA
        run: |
          helm upgrade --install keda kedacore/keda \
            --namespace keda \
            --wait --timeout=300s

      - name: Install kube-prometheus-stack
        run: |
          helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --set grafana.adminPassword=${{ secrets.GRAFANA_PASSWORD }} \
            --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
            --wait --timeout=600s

      - name: Install Grafana (additional dashboards)
        run: |
          kubectl apply -f monitoring/grafana/dashboards/ -n monitoring || true

      - name: Get ArgoCD initial password
        run: |
          echo "ArgoCD initial admin password:"
          kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d
          echo ""

  # ─────────────────────────────────────────────
  # JOB 5: Deploy Applications via ArgoCD
  # ─────────────────────────────────────────────
  deploy-apps:
    name: Deploy Applications
    runs-on: ubuntu-latest
    needs: install-cluster-tools

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Create application secrets
        run: |
          kubectl create secret generic app-secrets \
            --from-literal=db-host="${{ secrets.AURORA_ENDPOINT }}" \
            --from-literal=db-password="${{ secrets.DB_PASSWORD }}" \
            --from-literal=rabbit-url="amqp://admin:${{ secrets.RABBITMQ_PASSWORD }}@${{ secrets.RABBITMQ_IP }}:5672" \
            --namespace default \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic app-secrets \
            --from-literal=db-host="${{ secrets.AURORA_ENDPOINT }}" \
            --from-literal=db-password="${{ secrets.DB_PASSWORD }}" \
            --from-literal=rabbit-url="amqp://admin:${{ secrets.RABBITMQ_PASSWORD }}@${{ secrets.RABBITMQ_IP }}:5672" \
            --namespace worker \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ArgoCD Applications
        run: |
          kubectl apply -f argo/argocd-app-backend.yaml
          kubectl apply -f argo/argocd-app-worker.yaml
          kubectl apply -f argo/dlq-cronworkflow.yaml

      - name: Apply KEDA ScaledObject
        run: |
          kubectl apply -f k8s/keda-scaledobject.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend --timeout=300s || true
          kubectl rollout status deployment/frontend --timeout=300s || true

      - name: Print ALB endpoint
        run: |
          echo "==========================================="
          echo "Application is available at:"
          kubectl get ingress -A || true
          echo "ALB DNS: ${{ secrets.ALB_DNS }}"
          echo "==========================================="
