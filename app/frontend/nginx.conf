server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Docker internal DNS resolver ──────────────────────────────────────────
    # 127.0.0.11 is Docker's embedded DNS server.
    # valid=30s  → re-resolve every 30s (handles container restarts)
    # ipv6=off   → avoid IPv6 lookup failures in Docker bridge networks
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Proxy /api/* and /health to backend ───────────────────────────────────
    # IMPORTANT: set backend as a variable so nginx resolves it at request time
    # (not at startup), preventing "host not found" crashes when backend is
    # not yet ready.
    location /api/ {
        set $backend_host backend;
        proxy_pass         http://$backend_host:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    location /health {
        set $backend_host backend;
        proxy_pass http://$backend_host:3000/health;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}